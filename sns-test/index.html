<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS外部ブラウザ起動テスト</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <style>
    :root {
      --bg: #f6f2e9;
      --card: #ffffff;
      --text: #2a2a24;
      --text-soft: #6f6d65;
      --green: #18623a;
      --green-dark: #0f4c2c;
      --line: #e7e0d2;
      --shadow: 0 18px 44px rgba(56, 51, 41, 0.10);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.42), transparent 28%),
        var(--bg);
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      line-height: 1.25;
    }

    .lead {
      margin: 14px 0 0;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.8;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f5f8f5;
      border: 1px solid rgba(24, 98, 58, 0.14);
      color: var(--green-dark);
      font-weight: 700;
      line-height: 1.7;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .button-link,
    .text-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      line-height: 1.3;
    }

    .button-link {
      background: #f4e1bd;
      color: #3a3228;
      border: 3px solid var(--green);
      box-shadow: 0 6px 0 rgba(24, 98, 58, 0.95);
    }

    .text-link {
      background: #ffffff;
      color: var(--green);
      border: 2px solid var(--green);
    }

    .note {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #fffaf0;
      border: 1px solid #eadfbe;
      color: #5e513f;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .section-title {
      margin: 26px 0 10px;
      color: var(--green);
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .kv-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .kv-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: #fbf8f1;
      border: 1px solid var(--line);
    }

    .kv-label {
      display: block;
      margin: 0 0 8px;
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.4;
    }

    .kv-value {
      margin: 0;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.7;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px 12px 28px;
      }

      .card {
        padding: 18px 16px;
        border-radius: 20px;
      }

      .button-link,
      .text-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>SNS外部ブラウザ起動テスト</h1>
      <p class="lead">Facebook・Xのアプリ内ブラウザから、Chromeを開けるか確認するためのテストです。</p>

      <div id="result-status" class="status">まだ判定していません</div>

      <div class="actions">
        <a id="chrome-launch-link" class="button-link" href="#">Chromeでこのテストページを開く</a>
        <a class="text-link" href="https://keisuikai-mp.github.io/panseenote-lp/?from=sns-test">パンセノートLPを開く</a>
      </div>

      <p class="note">iPhoneではこのボタンでSafariを自動起動することはできません。画面右上のメニューから「Safariで開く」「ブラウザで開く」等を選んでください。</p>

      <h2 class="section-title">確認情報</h2>
      <ul class="kv-list">
        <li class="kv-item">
          <span class="kv-label">現在のURL</span>
          <p id="current-url" class="kv-value"></p>
        </li>
        <li class="kv-item">
          <span class="kv-label">document.referrer</span>
          <p id="referrer" class="kv-value"></p>
        </li>
        <li class="kv-item">
          <span class="kv-label">navigator.userAgent</span>
          <p id="user-agent" class="kv-value"></p>
        </li>
        <li class="kv-item">
          <span class="kv-label">result パラメータ判定</span>
          <p id="result-detail" class="kv-value"></p>
        </li>
      </ul>
    </section>
  </main>

  <script>
    (function () {
      var currentUrlEl = document.getElementById("current-url");
      var referrerEl = document.getElementById("referrer");
      var userAgentEl = document.getElementById("user-agent");
      var resultDetailEl = document.getElementById("result-detail");
      var resultStatusEl = document.getElementById("result-status");
      var chromeLaunchLinkEl = document.getElementById("chrome-launch-link");

      var currentUrl = new URL(window.location.href);
      var successUrl = new URL(currentUrl.toString());
      var fallbackUrl = new URL(currentUrl.toString());
      successUrl.searchParams.set("result", "chrome");
      fallbackUrl.searchParams.set("result", "fallback");

      var intentUrl =
        "intent://" +
        successUrl.host +
        successUrl.pathname +
        successUrl.search +
        "#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=" +
        encodeURIComponent(fallbackUrl.toString()) +
        ";end";

      chromeLaunchLinkEl.setAttribute("href", intentUrl);

      currentUrlEl.textContent = currentUrl.toString();
      referrerEl.textContent = document.referrer || "(空)";
      userAgentEl.textContent = navigator.userAgent || "(空)";

      var result = currentUrl.searchParams.get("result");
      var resultText = "まだ判定していません";

      if (result === "chrome") {
        resultText = "Chrome起動リンク経由でこのページを開けました";
      } else if (result === "fallback") {
        resultText = "Chromeを起動できず、フォールバック表示になりました";
      }

      resultStatusEl.textContent = resultText;
      resultDetailEl.textContent = resultText;
    })();
  </script>
</body>
</html>
